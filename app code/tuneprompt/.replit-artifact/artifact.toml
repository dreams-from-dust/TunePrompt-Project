kind = "mobile"
previewPath = "/"
title = "TunePrompt"
version = "1.0.0"
id = "artifacts/tuneprompt"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25828

[services.development]
run = "pnpm --filter @workspace/tuneprompt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tuneprompt", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tuneprompt", "run", "serve" ]

[services.env]
PORT = "25828"
BASE_PATH = "/"
